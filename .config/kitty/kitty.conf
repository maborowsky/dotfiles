# kitty.conf
# Defaults are in kitty.conf.bak so that this file can be cleaner
# copied a lot from: https://github.com/elenapan/dotfiles/blob/master/config/kitty/kitty.conf


# Testing
#macos_custom_beam_cursor no
# macos_show_window_title_in all
# macos_show_window_title_in none
# macos_thicken_font 0
macos_quit_when_last_window_closed yes
hide_window_decorations yes
macos_show_window_title_in all

# Kitty
allow_remote_control yes


# Theme
include themes.conf


# Fonts
# font_family      Input
# font_family      Iosevka-Nerd-Font-Mono
font_family      Iosevka-Nerd-Font-Mono-Light
italic_font      auto
bold_font        auto
bold_italic_font auto

font_size        16.0


# URLs
url_style double
open_url_modifiers ctrl+shift
open_url_with default
copy_on_select yes


# Selection
rectangle_select_modifiers ctrl+shift
select_by_word_characters :@-./_~?&=%+#


# Bell
visual_bell_duration 0.0
enable_audio_bell no

#
# Tabs
tab_bar_edge top
# tab_bar_style powerline
tab_bar_style separator
tab_separator " ┇ "
# tab_separator " | "
tab_title_template " {index} {title} "
active_tab_font_style bold
inactive_tab_font_style normal

map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Shell
term xterm-256color

